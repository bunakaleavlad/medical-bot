<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Інфузійний калькулятор</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2d4a6e;
            text-align: center;
        }
        h1 { font-size: 20px; color: #fff; }
        .disclaimer {
            background: #7f1d1d;
            color: #fecaca;
            padding: 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-bottom: 16px;
            text-align: center;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: #1e293b;
            padding: 4px;
            border-radius: 14px;
            flex-wrap: wrap;
        }
        .tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 2px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active { background: #3b82f6; color: white; }
        .card {
            background: #1e293b;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 15px;
            color: #93c5fd;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .input-group { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .result {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid #2d4a6e;
            margin-bottom: 14px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: #94a3b8; font-size: 13px; }
        .result-value { font-size: 18px; font-weight: 700; color: #fbbf24; }
        .result-unit { font-size: 12px; color: #64748b; font-weight: 400; }
        .warning {
            background: #422006;
            color: #fde68a;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.4;
            margin-top: 12px;
        }
        .warning.danger { background: #450a0a; color: #fecaca; }
        .warning.info { background: #1e3a5f; color: #bfdbfe; }
        .button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .button:active { background: #2563eb; }
        .hidden { display: none !important; }
        .protocol-badge {
            background: #1e3a5f;
            color: #93c5fd;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
            margin-top: 6px;
        }
        .critical { color: #ef4444 !important; }
        .success { color: #22c55e !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💊 Інфузійний калькулятор</h1>
        <span class="protocol-badge">Вазопресори • Інотропи • Седація • Аналгезія</span>
    </div>

    <div class="disclaimer">
        ⚕️ Для медичних працівників. Перевіряйте розрахунки та концентрації!
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="vasopressors">💉 Вазопресори</button>
        <button class="tab" data-tab="inotropes">❤️ Інотропи</button>
        <button class="tab" data-tab="sedation">😴 Седація</button>
        <button class="tab" data-tab="analgesia">💊 Аналгезія</button>
        <button class="tab" data-tab="epidural">🩺 Епідуральна</button>
    </div>

    <!-- СПІЛЬНЕ ПОЛЕ ВАГИ -->
    <div class="card">
        <div class="card-title">⚖️ Вага пацієнта</div>
        <div class="input-group">
            <label>Вага (кг)</label>
            <input type="number" id="global-weight" value="70" min="1" max="300" step="0.1">
        </div>
    </div>

    <!-- ==================== ВАЗОПРЕСОРИ ==================== -->
    <div id="tab-vasopressors" class="tab-content">
        <div class="card">
            <div class="card-title">💉 Вибір препарату</div>
            <div class="input-group">
                <label>Препарат</label>
                <select id="vasopressor-drug">
                    <option value="norepi">Норадреналін</option>
                    <option value="epi">Адреналін</option>
                    <option value="vaso">Вазопресин</option>
                </select>
            </div>
            <div class="input-group">
                <label>Розведення</label>
                <select id="vasopressor-dilution"></select>
            </div>
            <div class="input-group">
                <label>Доза</label>
                <input type="number" id="vasopressor-dose" value="0.1" step="0.01" min="0.01">
                <span id="vasopressor-dose-unit" style="color: #94a3b8; font-size: 12px;">мкг/кг/хв</span>
            </div>
        </div>
        <div class="result" id="vasopressor-result"></div>
        <div class="warning info" id="vasopressor-warning"></div>
    </div>

    <!-- ==================== ІНОТРОПИ ==================== -->
    <div id="tab-inotropes" class="tab-content hidden">
        <div class="card">
            <div class="card-title">❤️ Вибір препарату</div>
            <div class="input-group">
                <label>Препарат</label>
                <select id="inotrope-drug">
                    <option value="dobutamine">Добутамін</option>
                    <option value="dopamine">Допамін</option>
                </select>
            </div>
            <div class="input-group">
                <label>Розведення</label>
                <select id="inotrope-dilution"></select>
            </div>
            <div class="input-group">
                <label>Доза (мкг/кг/хв)</label>
                <input type="number" id="inotrope-dose" value="5.0" step="0.1" min="1.0">
            </div>
        </div>
        <div class="result" id="inotrope-result"></div>
        <div class="warning info" id="inotrope-warning"></div>
    </div>

    <!-- ==================== СЕДАЦІЯ ==================== -->
    <div id="tab-sedation" class="tab-content hidden">
        <div class="card">
            <div class="card-title">😴 Вибір препарату</div>
            <div class="input-group">
                <label>Препарат</label>
                <select id="sedation-drug">
                    <option value="propofol">Пропофол</option>
                    <option value="dexdor">Дексдор (Дексмедетомідин)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Розведення / Концентрація</label>
                <select id="sedation-dilution"></select>
            </div>
            <div class="input-group">
                <label>Доза</label>
                <input type="number" id="sedation-dose" value="2.0" step="0.1" min="0.1">
                <span id="sedation-dose-unit" style="color: #94a3b8; font-size: 12px;">мг/кг/год</span>
            </div>
        </div>
        <div class="result" id="sedation-result"></div>
        <div class="warning info" id="sedation-warning"></div>
    </div>

    <!-- ==================== АНАЛГЕЗІЯ ==================== -->
    <div id="tab-analgesia" class="tab-content hidden">
        <div class="card">
            <div class="card-title">💊 Вибір препарату</div>
            <div class="input-group">
                <label>Препарат</label>
                <select id="analgesia-drug">
                    <option value="fentanyl">Фентаніл</option>
                    <option value="morphine">Морфін</option>
                </select>
            </div>
            <div class="input-group">
                <label>Розведення</label>
                <select id="analgesia-dilution"></select>
            </div>
            <div class="input-group">
                <label>Доза</label>
                <input type="number" id="analgesia-dose" value="2.0" step="0.1" min="0.1">
                <span id="analgesia-dose-unit" style="color: #94a3b8; font-size: 12px;">мкг/кг/год</span>
            </div>
        </div>
        <div class="result" id="analgesia-result"></div>
        <div class="warning info" id="analgesia-warning"></div>
    </div>

    <!-- ==================== ЕПІДУРАЛЬНА ==================== -->
    <div id="tab-epidural" class="tab-content hidden">
        <div class="card">
            <div class="card-title">🩺 Епідуральна анестезія</div>
            <div class="input-group">
                <label>Розчин</label>
                <select id="epidural-solution">
                    <option value="bupi0125">Бупівакаїн 0.125% (1.25 мг/мл)</option>
                    <option value="bupi025">Бупівакаїн 0.25% (2.5 мг/мл)</option>
                    <option value="bupi+fent">Бупівакаїн 0.125% + Фентаніл 2 мкг/мл</option>
                </select>
            </div>
            <div class="input-group">
                <label>Швидкість інфузії (мл/год)</label>
                <input type="number" id="epidural-rate" value="6" min="1" max="15" step="0.5">
            </div>
            <div class="input-group">
                <label>Болюс (мл)</label>
                <input type="number" id="epidural-bolus" value="5" min="0" max="10" step="0.5">
            </div>
        </div>
        <div class="result" id="epidural-result"></div>
        <div class="warning info" id="epidural-warning"></div>
    </div>

    <button class="button" onclick="calculateCurrent()">🧮 РОЗРАХУВАТИ</button>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        // ==================== БАЗА ДАНИХ РОЗВЕДЕНЬ ====================
        const dilutions = {
            norepi: [
                { name: '4 мг / 50 мл (80 мкг/мл)', conc: 80, vol: 50 },
                { name: '8 мг / 50 мл (160 мкг/мл)', conc: 160, vol: 50 },
                { name: '4 мг / 20 мл (200 мкг/мл)', conc: 200, vol: 20 },
                { name: '8 мг / 20 мл (400 мкг/мл)', conc: 400, vol: 20 }
            ],
            epi: [
                { name: '4 мг / 50 мл (80 мкг/мл)', conc: 80, vol: 50 },
                { name: '4 мг / 20 мл (200 мкг/мл)', conc: 200, vol: 20 }
            ],
            vaso: [
                { name: '20 ОД / 50 мл (0.4 ОД/мл)', conc: 0.4, vol: 50, unit: 'ОД/мл' },
                { name: '20 ОД / 20 мл (1.0 ОД/мл)', conc: 1.0, vol: 20, unit: 'ОД/мл' }
            ],
            dobutamine: [
                { name: '250 мг / 50 мл (5 мг/мл)', conc: 5000, vol: 50 },
                { name: '250 мг / 20 мл (12.5 мг/мл)', conc: 12500, vol: 20 }
            ],
            dopamine: [
                { name: '200 мг / 50 мл (4 мг/мл)', conc: 4000, vol: 50 },
                { name: '200 мг / 20 мл (10 мг/мл)', conc: 10000, vol: 20 }
            ],
            propofol: [
                { name: 'Пропофол 1% (10 мг/мл)', conc: 10, vol: 50, unit: 'мг/мл' },
                { name: 'Пропофол 2% (20 мг/мл)', conc: 20, vol: 50, unit: 'мг/мл' }
            ],
            dexdor: [
                { name: '200 мкг / 50 мл (4 мкг/мл)', conc: 4, vol: 50 },
                { name: '200 мкг / 20 мл (10 мкг/мл)', conc: 10, vol: 20 },
                { name: '400 мкг / 50 мл (8 мкг/мл)', conc: 8, vol: 50 },
                { name: '400 мкг / 20 мл (20 мкг/мл)', conc: 20, vol: 20 }
            ],
            fentanyl: [
                { name: '500 мкг / 50 мл (10 мкг/мл)', conc: 10, vol: 50 },
                { name: '500 мкг / 20 мл (25 мкг/мл)', conc: 25, vol: 20 },
                { name: '1000 мкг / 50 мл (20 мкг/мл)', conc: 20, vol: 50 }
            ],
            morphine: [
                { name: '50 мг / 50 мл (1 мг/мл)', conc: 1, vol: 50, unit: 'мг/мл' },
                { name: '50 мг / 20 мл (2.5 мг/мл)', conc: 2.5, vol: 20, unit: 'мг/мл' },
                { name: '100 мг / 50 мл (2 мг/мл)', conc: 2, vol: 50, unit: 'мг/мл' }
            ]
        };

        let currentDrug = 'norepi';

        // ==================== ОНОВЛЕННЯ ВИПАДАЮЧИХ СПИСКІВ ====================
        function updateDilutionSelect() {
            const vDrug = document.getElementById('vasopressor-drug').value;
            const iDrug = document.getElementById('inotrope-drug').value;
            const sDrug = document.getElementById('sedation-drug').value;
            const aDrug = document.getElementById('analgesia-drug').value;

            updateSelect('vasopressor-dilution', vDrug === 'norepi' ? 'norepi' : vDrug === 'epi' ? 'epi' : 'vaso');
            updateSelect('inotrope-dilution', iDrug === 'dobutamine' ? 'dobutamine' : 'dopamine');
            updateSelect('sedation-dilution', sDrug === 'propofol' ? 'propofol' : 'dexdor');
            updateSelect('analgesia-dilution', aDrug === 'fentanyl' ? 'fentanyl' : 'morphine');

            // Оновлення одиниць дози
            if (sDrug === 'propofol') {
                document.getElementById('sedation-dose-unit').textContent = 'мг/кг/год';
                document.getElementById('sedation-dose').value = '2.0';
                document.getElementById('sedation-dose').step = '0.5';
            } else {
                document.getElementById('sedation-dose-unit').textContent = 'мкг/кг/год';
                document.getElementById('sedation-dose').value = '0.7';
                document.getElementById('sedation-dose').step = '0.1';
            }

            if (aDrug === 'fentanyl') {
                document.getElementById('analgesia-dose-unit').textContent = 'мкг/кг/год';
                document.getElementById('analgesia-dose').value = '2.0';
            } else {
                document.getElementById('analgesia-dose-unit').textContent = 'мг/кг/год';
                document.getElementById('analgesia-dose').value = '0.05';
                document.getElementById('analgesia-dose').step = '0.01';
            }

            if (vDrug === 'vaso') {
                document.getElementById('vasopressor-dose-unit').textContent = 'ОД/хв';
                document.getElementById('vasopressor-dose').value = '0.02';
                document.getElementById('vasopressor-dose').step = '0.01';
            } else {
                document.getElementById('vasopressor-dose-unit').textContent = 'мкг/кг/хв';
                document.getElementById('vasopressor-dose').value = '0.1';
                document.getElementById('vasopressor-dose').step = '0.05';
            }
        }

        function updateSelect(id, drugKey) {
            const select = document.getElementById(id);
            const options = dilutions[drugKey];
            if (!options) return;
            
            select.innerHTML = options.map(opt => 
                `<option value="${opt.conc}" data-vol="${opt.vol}" data-unit="${opt.unit || ''}">${opt.name}</option>`
            ).join('');
            currentDrug = drugKey;
        }

        // ==================== РОЗРАХУНКИ ====================
        function getWeight() {
            return parseFloat(document.getElementById('global-weight').value) || 70;
        }

        function calculateVasopressor() {
            const weight = getWeight();
            const drug = document.getElementById('vasopressor-drug').value;
            const select = document.getElementById('vasopressor-dilution');
            const conc = parseFloat(select.value);
            const vol = parseFloat(select.selectedOptions[0].dataset.vol);
            const dose = parseFloat(document.getElementById('vasopressor-dose').value) || 0.1;

            let rate = 0, warning = '';
            
            if (drug === 'vaso') {
                rate = (dose * 60) / conc;
                warning = `⚕️ Вазопресин НЕ залежить від ваги. Швидкість: ${rate.toFixed(1)} мл/год.`;
                if (dose > 0.04) warning = '⚠️ Доза > 0.04 ОД/хв! Ризик ішемії!';
            } else {
                rate = (dose * weight * 60) / conc;
                const maxDose = drug === 'norepi' ? 2.0 : 1.0;
                if (dose > maxDose) warning = `⚠️ Доза перевищує стандартну максимальну (${maxDose} мкг/кг/хв)!`;
                if (drug === 'norepi') warning += ' 🩸 Центральний доступ обов\'язковий!';
            }

            const duration = vol / rate;
            const dailyDose = drug === 'vaso' ? dose * 1440 : dose * weight * 1440 / 1000;

            document.getElementById('vasopressor-result').innerHTML = `
                <div class="result-row"><span class="result-label">Концентрація:</span><span class="result-value">${conc.toFixed(1)} ${drug === 'vaso' ? 'ОД/мл' : 'мкг/мл'}</span></div>
                <div class="result-row"><span class="result-label">Швидкість інфузії:</span><span class="result-value">${rate.toFixed(1)} <span class="result-unit">мл/год</span></span></div>
                <div class="result-row"><span class="result-label">Тривалість шприца:</span><span class="result-value">${duration.toFixed(1)} <span class="result-unit">год</span></span></div>
                <div class="result-row"><span class="result-label">Добова потреба:</span><span class="result-value">${dailyDose.toFixed(1)} ${drug === 'vaso' ? 'ОД' : 'мг'}</span></div>
            `;
            
            const warnEl = document.getElementById('vasopressor-warning');
            warnEl.textContent = warning || '✅ Доза в межах стандартного діапазону.';
        }

        function calculateInotrope() {
            const weight = getWeight();
            const select = document.getElementById('inotrope-dilution');
            const conc = parseFloat(select.value);
            const vol = parseFloat(select.selectedOptions[0].dataset.vol);
            const dose = parseFloat(document.getElementById('inotrope-dose').value) || 5.0;

            const rate = (dose * weight * 60) / conc;
            const duration = vol / rate;
            const dailyDose = dose * weight * 1440 / 1000;

            let warning = '';
            if (dose > 20) warning = '⚠️ Доза > 20 мкг/кг/хв! Ризик аритмій!';
            if (document.getElementById('inotrope-drug').value === 'dobutamine') {
                warning += ' 🧪 Не змішувати з NaHCO₃!';
            }

            document.getElementById('inotrope-result').innerHTML = `
                <div class="result-row"><span class="result-label">Концентрація:</span><span class="result-value">${(conc/1000).toFixed(2)} <span class="result-unit">мг/мл</span></span></div>
                <div class="result-row"><span class="result-label">Швидкість інфузії:</span><span class="result-value">${rate.toFixed(1)} <span class="result-unit">мл/год</span></span></div>
                <div class="result-row"><span class="result-label">Тривалість шприца:</span><span class="result-value">${duration.toFixed(1)} <span class="result-unit">год</span></span></div>
                <div class="result-row"><span class="result-label">Добова потреба:</span><span class="result-value">${dailyDose.toFixed(0)} <span class="result-unit">мг</span></span></div>
            `;
            
            document.getElementById('inotrope-warning').textContent = warning || '✅ Доза в межах стандартного діапазону.';
        }

        function calculateSedation() {
            const weight = getWeight();
            const drug = document.getElementById('sedation-drug').value;
            const select = document.getElementById('sedation-dilution');
            const conc = parseFloat(select.value);
            const vol = parseFloat(select.selectedOptions[0].dataset.vol);
            const dose = parseFloat(document.getElementById('sedation-dose').value) || 2.0;

            let rate = 0, warning = '';
            
            if (drug === 'propofol') {
                rate = (dose * weight) / conc;
                if (dose > 4.0) warning = '⚠️ Доза > 4 мг/кг/год! PRIS-синдром!';
                warning += ' ⏱️ Макс. тривалість 7 днів!';
            } else {
                rate = (dose * weight) / conc;
                if (dose > 1.4) warning = '⚠️ Доза > 1.4 мкг/кг/год!';
                warning += ' ❤️ Брадикардія! Не болюсно!';
            }

            const duration = vol / rate;
            const dailyDose = drug === 'propofol' ? dose * weight * 24 : dose * weight * 24 / 1000;

            document.getElementById('sedation-result').innerHTML = `
                <div class="result-row"><span class="result-label">Концентрація:</span><span class="result-value">${conc} ${drug === 'propofol' ? 'мг/мл' : 'мкг/мл'}</span></div>
                <div class="result-row"><span class="result-label">Швидкість інфузії:</span><span class="result-value">${rate.toFixed(1)} <span class="result-unit">мл/год</span></span></div>
                <div class="result-row"><span class="result-label">Тривалість шприца:</span><span class="result-value">${duration.toFixed(1)} <span class="result-unit">год</span></span></div>
                <div class="result-row"><span class="result-label">Добова потреба:</span><span class="result-value">${dailyDose.toFixed(0)} ${drug === 'propofol' ? 'мг' : 'мкг'}</span></div>
            `;
            
            document.getElementById('sedation-warning').textContent = warning || '✅ Доза в межах стандартного діапазону.';
        }

        function calculateAnalgesia() {
            const weight = getWeight();
            const drug = document.getElementById('analgesia-drug').value;
            const select = document.getElementById('analgesia-dilution');
            const conc = parseFloat(select.value);
            const vol = parseFloat(select.selectedOptions[0].dataset.vol);
            const dose = parseFloat(document.getElementById('analgesia-dose').value) || 2.0;

            let rate = 0, warning = '';
            
            if (drug === 'fentanyl') {
                rate = (dose * weight) / conc;
                if (dose > 5.0) warning = '⚠️ Доза > 5 мкг/кг/год! Ризик ригідності!';
            } else {
                rate = (dose * weight) / conc;
                if (dose > 0.1) warning = '⚠️ Доза > 0.1 мг/кг/год! Депресія дихання!';
            }

            const duration = vol / rate;

            document.getElementById('analgesia-result').innerHTML = `
                <div class="result-row"><span class="result-label">Концентрація:</span><span class="result-value">${conc} ${drug === 'fentanyl' ? 'мкг/мл' : 'мг/мл'}</span></div>
                <div class="result-row"><span class="result-label">Швидкість інфузії:</span><span class="result-value">${rate.toFixed(1)} <span class="result-unit">мл/год</span></span></div>
                <div class="result-row"><span class="result-label">Тривалість шприца:</span><span class="result-value">${duration.toFixed(1)} <span class="result-unit">год</span></span></div>
            `;
            
            document.getElementById('analgesia-warning').textContent = warning || '✅ Доза в межах стандартного діапазону.';
        }

        function calculateEpidural() {
            const solution = document.getElementById('epidural-solution').value;
            const rate = parseFloat(document.getElementById('epidural-rate').value) || 6;
            const bolus = parseFloat(document.getElementById('epidural-bolus').value) || 5;
            
            let conc = 0, maxDailyMg = 400;
            if (solution === 'bupi0125') conc = 1.25;
            else if (solution === 'bupi025') conc = 2.5;
            else conc = 1.25;

            const dailyVolume = rate * 24;
            const dailyDose = dailyVolume * conc;
            const warning = dailyDose > maxDailyMg ? '⚠️ Перевищення максимальної добової дози бупівакаїну (400 мг)!' : '✅ Доза в межах безпечної.';

            document.getElementById('epidural-result').innerHTML = `
                <div class="result-row"><span class="result-label">Концентрація бупівакаїну:</span><span class="result-value">${conc} <span class="result-unit">мг/мл</span></span></div>
                <div class="result-row"><span class="result-label">Швидкість інфузії:</span><span class="result-value">${rate} <span class="result-unit">мл/год</span></span></div>
                <div class="result-row"><span class="result-label">Болюс:</span><span class="result-value">${bolus} <span class="result-unit">мл</span></span></div>
                <div class="result-row"><span class="result-label">Добова доза:</span><span class="result-value">${dailyDose.toFixed(0)} <span class="result-unit">мг/добу</span></span></div>
            `;
            
            document.getElementById('epidural-warning').textContent = warning + ' 🩺 Кардіотоксичність! Не в/в!';
        }

        // ==================== НАВІГАЦІЯ ====================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabId) btn.classList.add('active');
            });
            calculateCurrent();
        }

        function calculateCurrent() {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            const calculators = {
                'vasopressors': calculateVasopressor,
                'inotropes': calculateInotrope,
                'sedation': calculateSedation,
                'analgesia': calculateAnalgesia,
                'epidural': calculateEpidural
            };
            if (calculators[activeTab]) calculators[activeTab]();
        }

        // ==================== ІНІЦІАЛІЗАЦІЯ ====================
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });

            // Прив'язка подій
            const inputs = ['vasopressor-drug', 'vasopressor-dilution', 'vasopressor-dose',
                           'inotrope-drug', 'inotrope-dilution', 'inotrope-dose',
                           'sedation-drug', 'sedation-dilution', 'sedation-dose',
                           'analgesia-drug', 'analgesia-dilution', 'analgesia-dose',
                           'epidural-solution', 'epidural-rate', 'epidural-bolus',
                           'global-weight'];
            
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', calculateCurrent);
                    el.addEventListener('change', function() {
                        if (id.includes('drug')) updateDilutionSelect();
                        calculateCurrent();
                    });
                }
            });

            updateDilutionSelect();
            calculateVasopressor();
        });
    </script>
</body>
</html>
